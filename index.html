<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ducky Land</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Pond: full-viewport pixel water -->
  <div class="pond" id="pond">

    <!-- Lily pads -->
    <div class="lily-pad" style="bottom:18%;left:6%"><div class="lily-flower"></div></div>
    <div class="lily-pad lily-pad--sm" style="bottom:55%;left:14%"></div>
    <div class="lily-pad lily-pad--lg" style="bottom:72%;left:58%"><div class="lily-flower"></div></div>
    <div class="lily-pad lily-pad--sm" style="bottom:32%;right:10%"></div>
    <div class="lily-pad" style="bottom:50%;right:24%"><div class="lily-flower"></div></div>
    <div class="lily-pad lily-pad--sm" style="bottom:80%;left:38%"></div>
    <div class="lily-pad" style="bottom:62%;right:40%"><div class="lily-flower"></div></div>
    <div class="lily-pad lily-pad--sm" style="bottom:42%;left:46%"></div>
    <div class="lily-pad lily-pad--lg" style="bottom:25%;right:38%"><div class="lily-flower"></div></div>
    <div class="lily-pad lily-pad--sm" style="bottom:10%;left:32%"></div>
    <div class="lily-pad" style="bottom:88%;left:20%"><div class="lily-flower"></div></div>
    <div class="lily-pad lily-pad--sm" style="bottom:46%;left:76%"></div>
    <div class="lily-pad lily-pad--lg" style="bottom:68%;right:8%"><div class="lily-flower"></div></div>
    <div class="lily-pad lily-pad--sm" style="bottom:14%;right:48%"></div>

    <!-- Floating leaves -->
    <div class="pond-leaf" style="bottom:38%;left:28%"></div>
    <div class="pond-leaf pond-leaf--sm" style="bottom:67%;right:16%"></div>
    <div class="pond-leaf" style="bottom:20%;right:55%"></div>
    <div class="pond-leaf pond-leaf--sm" style="bottom:82%;left:70%"></div>
    <div class="pond-leaf" style="bottom:58%;left:86%"></div>
    <div class="pond-leaf pond-leaf--sm" style="bottom:22%;left:60%"></div>
    <div class="pond-leaf" style="bottom:75%;right:32%"></div>

    <!-- Reed clusters -->
    <div class="reed-cluster" style="bottom:0;left:3%">
      <div class="reed" style="height:80px;left:0"></div>
      <div class="reed" style="height:100px;left:10px"></div>
      <div class="reed" style="height:70px;left:20px"></div>
    </div>
    <div class="reed-cluster" style="bottom:0;right:5%">
      <div class="reed" style="height:90px;left:0"></div>
      <div class="reed" style="height:65px;left:12px"></div>
      <div class="reed" style="height:105px;left:22px"></div>
    </div>
    <div class="reed-cluster" style="bottom:0;left:44%">
      <div class="reed" style="height:72px;left:0"></div>
      <div class="reed" style="height:88px;left:11px"></div>
    </div>
    <div class="reed-cluster" style="bottom:0;left:22%">
      <div class="reed" style="height:68px;left:0"></div>
      <div class="reed" style="height:90px;left:11px"></div>
      <div class="reed" style="height:58px;left:22px"></div>
    </div>
    <div class="reed-cluster" style="bottom:0;right:26%">
      <div class="reed" style="height:78px;left:0"></div>
      <div class="reed" style="height:55px;left:12px"></div>
      <div class="reed" style="height:95px;left:22px"></div>
    </div>

    <!-- Underwater plants -->
    <div class="plant-cluster" style="bottom:0;left:35%">
      <div class="underwater-plant" style="height:75px;left:0;animation-delay:-1.2s"></div>
      <div class="underwater-plant" style="height:105px;left:14px;animation-delay:-2.8s"></div>
      <div class="underwater-plant" style="height:60px;left:26px;animation-delay:-0.5s"></div>
      <div class="underwater-plant" style="height:90px;left:38px;animation-delay:-3.5s"></div>
    </div>
    <div class="plant-cluster" style="bottom:0;left:62%">
      <div class="underwater-plant" style="height:85px;left:0;animation-delay:-2s"></div>
      <div class="underwater-plant" style="height:65px;left:14px;animation-delay:-0.8s"></div>
      <div class="underwater-plant" style="height:110px;left:26px;animation-delay:-3s"></div>
    </div>
    <div class="plant-cluster" style="bottom:0;left:14%">
      <div class="underwater-plant" style="height:70px;left:0;animation-delay:-1.8s"></div>
      <div class="underwater-plant" style="height:95px;left:14px;animation-delay:-3.2s"></div>
    </div>
    <div class="plant-cluster" style="bottom:0;right:18%">
      <div class="underwater-plant" style="height:80px;left:0;animation-delay:-0.4s"></div>
      <div class="underwater-plant" style="height:55px;left:14px;animation-delay:-2.2s"></div>
      <div class="underwater-plant" style="height:100px;left:26px;animation-delay:-1s"></div>
    </div>

    <div class="duck-zone" id="duckZone"></div>
  </div>

  <!-- Counter widget: top-right overlay -->
  <div class="counter" id="counter">
    <div class="counter__label">Together</div>
    <div class="counter__number" id="counterNumber">—</div>
    <div class="counter__unit" id="counterUnit"></div>
    <button class="counter__toggle" id="toggleBtn">Days ↔ Months</button>
    <button class="counter__edit" id="editBtn">✏ Edit</button>
  </div>

  <!-- Date modal: first-visit overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <h2 class="modal-card__heading" id="modalHeading">When did your story begin? 🐥</h2>
      <input type="date" class="modal-card__input" id="dateInput">
      <button class="modal-card__btn" id="saveBtn">Start our story</button>
    </div>
  </div>

  <!-- Dashboard panel -->
  <div class="dashboard" id="dashboard" role="dialog" aria-modal="true" aria-label="Stats dashboard" aria-hidden="true">
    <div class="dashboard__header">
      <span class="dashboard__title">Our Story 🐥</span>
      <button class="dashboard__close" id="dashboardClose" aria-label="Close dashboard">×</button>
    </div>
    <div class="dashboard__content">
      <div class="dashboard__stats-grid">
        <div class="dashboard__stat">
          <div class="dashboard__stat-label">Days Together</div>
          <div class="dashboard__stat-value" id="dashStat-days">—</div>
        </div>
        <div class="dashboard__stat">
          <div class="dashboard__stat-label">Months Together</div>
          <div class="dashboard__stat-value dashboard__stat-value--sm" id="dashStat-months">—</div>
        </div>
        <div class="dashboard__stat">
          <div class="dashboard__stat-label">Ducks Swimming</div>
          <div class="dashboard__stat-value" id="dashStat-ducks">—</div>
        </div>
        <div class="dashboard__stat">
          <div class="dashboard__stat-label">Next Duck</div>
          <div class="dashboard__stat-value dashboard__stat-value--sm" id="dashStat-next">—</div>
        </div>
      </div>
      <div class="dashboard__duck-section">
        <div class="dashboard__duck-header" id="dashStat-named-header">— ducks named</div>
        <div class="dashboard__duck-list" id="dashStat-duck-list"></div>
      </div>
    </div>
  </div>

  <!-- Falling leaves canvas -->
  <div class="leaves-container" id="leavesContainer" aria-hidden="true"></div>

  <!-- Fireflies canvas (night mode) -->
  <div class="fireflies-container" id="firefliesContainer" aria-hidden="true"></div>

  <!-- Fish bubbles canvas -->
  <div class="bubbles-container" id="bubblesContainer" aria-hidden="true"></div>

  <!-- Floating dashboard trigger -->
  <button class="dashboard-btn" id="dashboardBtn" aria-label="Open stats dashboard">🦆</button>

  <!-- Background music -->
  <audio id="bgMusic" loop src="The Bridge - Sad &amp; Beautiful Piano Song &amp; Violin BigRicePiano.mp3"></audio>
  <button class="nightmode-btn" id="nightModeBtn" aria-label="Switch to night mode">🌙</button>
  <button class="music-btn" id="musicBtn" aria-label="Play music">🔇</button>

  <script src="logic.js"></script>
  <script src="app.js"></script>
</body>
</html>
